version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # پورت دیتابیس که تغییر دادیم
    networks:
      - diet_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # پورت ردیس که تغییر دادیم
    volumes:
      - redis_data:/data
    networks:
      - diet_network
    command: redis-server --appendonly yes

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    networks:
      - diet_network

  celery:
    build: .
    command: celery -A config worker -l info -Q default,notification,cleanup,analytics,discounts
    volumes:
      - .:/app
      - media_volume:/app/media
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    networks:
      - diet_network

  celery-beat:
    build: .
    command: celery -A config beat -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    networks:
      - diet_network

  nginx:
    image: nginx:alpine
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"      # پورت سایت که تغییر دادیم
    depends_on:
      - web
    networks:
      - diet_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  diet_network:
    driver: bridge